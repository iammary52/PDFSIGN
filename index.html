<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 도장/서명 찍기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }

  .header { background: #2c3e50; color: white; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header svg { width: 28px; height: 28px; }

  .container { display: flex; height: calc(100vh - 56px); }

  /* Sidebar */
  .sidebar { width: 300px; min-width: 300px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; overflow-y: auto; }
  .sidebar-section { padding: 16px; border-bottom: 1px solid #eee; }
  .sidebar-section h3 { font-size: 13px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }

  .drop-zone { border: 2px dashed #c0c8d4; border-radius: 10px; padding: 20px 16px; text-align: center; cursor: pointer; transition: all 0.2s; background: #fafbfc; }
  .drop-zone:hover, .drop-zone.drag-over { border-color: #4a90d9; background: #f0f6ff; }
  .drop-zone svg { width: 36px; height: 36px; color: #a0aab4; margin-bottom: 8px; }
  .drop-zone.drag-over svg { color: #4a90d9; }
  .drop-zone p { font-size: 13px; color: #777; line-height: 1.5; }
  .drop-zone strong { color: #4a90d9; }
  .drop-zone input { display: none; }

  .file-info { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: #f0f6ff; border-radius: 8px; margin-top: 8px; }
  .file-info svg { width: 18px; height: 18px; color: #4a90d9; flex-shrink: 0; }
  .file-info span { font-size: 12px; color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-info .remove-btn { margin-left: auto; background: none; border: none; cursor: pointer; color: #999; font-size: 16px; line-height: 1; flex-shrink: 0; }
  .file-info .remove-btn:hover { color: #e74c3c; }

  .stamp-preview { width: 100%; height: 120px; border: 1px solid #eee; border-radius: 8px; background: repeating-conic-gradient(#f0f0f0 0% 25%, white 0% 50%) 0 0 / 16px 16px; display: flex; align-items: center; justify-content: center; margin-top: 8px; overflow: hidden; }
  .stamp-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }

  label.control-label { display: block; font-size: 12px; color: #777; margin-bottom: 4px; margin-top: 10px; }
  input[type="range"] { width: 100%; accent-color: #4a90d9; }
  .range-row { display: flex; align-items: center; gap: 8px; }
  .range-row input[type="number"] { width: 56px; border: 1px solid #ddd; border-radius: 6px; padding: 4px 6px; font-size: 12px; text-align: center; }

  .page-nav { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 10px 16px; background: white; border-bottom: 1px solid #eee; }
  .page-nav button { background: #4a90d9; color: white; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px; transition: background 0.2s; }
  .page-nav button:hover { background: #357abd; }
  .page-nav button:disabled { background: #ccc; cursor: not-allowed; }
  .page-nav span { font-size: 13px; color: #555; min-width: 80px; text-align: center; }

  .btn { display: block; width: 100%; padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; text-align: center; }
  .btn-primary { background: #27ae60; color: white; }
  .btn-primary:hover { background: #219a52; }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
  .btn-secondary { background: #4a90d9; color: white; margin-top: 8px; }
  .btn-secondary:hover { background: #357abd; }
  .btn-danger { background: #e74c3c; color: white; margin-top: 8px; }
  .btn-danger:hover { background: #c0392b; }

  /* Canvas area */
  .canvas-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .canvas-wrapper { flex: 1; overflow: auto; background: #6b7280; display: flex; align-items: flex-start; justify-content: center; padding: 24px; }
  .canvas-container { position: relative; display: inline-block; box-shadow: 0 4px 20px rgba(0,0,0,0.3); cursor: crosshair; }
  .canvas-container canvas { display: block; }

  #stampOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

  .stamp-handle { position: absolute; cursor: move; user-select: none; pointer-events: auto; }
  .stamp-handle img { display: block; width: 100%; height: 100%; pointer-events: none; -webkit-user-drag: none; }
  .stamp-handle.selected { outline: 2px dashed #4a90d9; outline-offset: 2px; }
  .stamp-handle .resize-handle { position: absolute; width: 10px; height: 10px; background: white; border: 2px solid #4a90d9; border-radius: 50%; cursor: se-resize; right: -5px; bottom: -5px; }
  .stamp-handle .delete-handle { position: absolute; width: 18px; height: 18px; background: #e74c3c; border-radius: 50%; cursor: pointer; top: -9px; right: -9px; display: flex; align-items: center; justify-content: center; color: white; font-size: 11px; font-weight: bold; line-height: 1; }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #9ca3af; text-align: center; gap: 12px; }
  .empty-state svg { width: 80px; height: 80px; opacity: 0.3; }
  .empty-state p { font-size: 16px; }
  .empty-state small { font-size: 13px; opacity: 0.7; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: #2c3e50; color: white; padding: 12px 20px; border-radius: 10px; font-size: 14px; opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none; z-index: 9999; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: #27ae60; }
  .toast.error { background: #e74c3c; }

  .zoom-controls { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: white; border-bottom: 1px solid #eee; }
  .zoom-controls button { background: #f0f2f5; border: 1px solid #ddd; border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .zoom-controls button:hover { background: #e0e4ea; }
  .zoom-controls span { font-size: 13px; color: #555; min-width: 48px; text-align: center; }

  .stamp-list { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; max-height: 120px; overflow-y: auto; }
  .stamp-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 12px; color: #555; transition: background 0.15s; }
  .stamp-item:hover { background: #f0f6ff; }
  .stamp-item.active { background: #e8f4fd; color: #357abd; font-weight: 600; }
  .stamp-item img { width: 28px; height: 28px; object-fit: contain; border: 1px solid #eee; border-radius: 4px; background: repeating-conic-gradient(#f0f0f0 0% 25%, white 0% 50%) 0 0 / 8px 8px; }

  .opacity-row { display: flex; align-items: center; gap: 8px; }
  .opacity-row input[type="number"] { width: 52px; border: 1px solid #ddd; border-radius: 6px; padding: 4px 6px; font-size: 12px; text-align: center; }

  @media (max-width: 640px) {
    .container { flex-direction: column; }
    .sidebar { width: 100%; min-width: unset; max-height: 50vh; }
  }
</style>
</head>
<body>

<div class="header">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
  </svg>
  <h1>PDF 도장 / 서명 찍기</h1>
</div>

<div class="container">
  <!-- Sidebar -->
  <div class="sidebar">
    <!-- PDF Upload -->
    <div class="sidebar-section">
      <h3>PDF 파일</h3>
      <div class="drop-zone" id="pdfDrop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
          <path d="M13 3v5a1 1 0 001 1h5M9 13h6M9 17h4"/>
        </svg>
        <p><strong>클릭</strong>하거나 PDF를 여기에 드롭</p>
        <input type="file" id="pdfInput" accept=".pdf,application/pdf">
      </div>
      <div class="file-info" id="pdfFileInfo" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
        </svg>
        <span id="pdfFileName"></span>
        <button class="remove-btn" id="removePdf">×</button>
      </div>
    </div>

    <!-- Stamp Upload -->
    <div class="sidebar-section">
      <h3>도장 / 서명 이미지</h3>
      <div class="drop-zone" id="stampDrop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <p><strong>클릭</strong>하거나 이미지를 여기에 드롭<br><small style="color:#aaa">PNG (투명 배경 권장), JPG</small></p>
        <input type="file" id="stampInput" accept="image/*">
      </div>
      <div id="stampPreviewWrap" style="display:none">
        <div class="stamp-preview">
          <img id="stampPreviewImg" src="" alt="stamp preview">
        </div>
        <div class="file-info">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
          </svg>
          <span id="stampFileName"></span>
          <button class="remove-btn" id="removeStamp">×</button>
        </div>
      </div>

      <!-- Stamp list on canvas -->
      <div id="stampListSection" style="display:none; margin-top:10px;">
        <label class="control-label">페이지에 찍힌 도장 목록</label>
        <div class="stamp-list" id="stampList"></div>
      </div>
    </div>

    <!-- Stamp Controls -->
    <div class="sidebar-section" id="stampControls" style="display:none">
      <h3>도장 설정</h3>

      <label class="control-label">크기 (너비 px)</label>
      <div class="range-row">
        <input type="range" id="stampSizeRange" min="20" max="400" value="120">
        <input type="number" id="stampSizeNum" min="20" max="400" value="120">
      </div>

      <label class="control-label">투명도</label>
      <div class="opacity-row">
        <input type="range" id="stampOpacityRange" min="10" max="100" value="100">
        <input type="number" id="stampOpacityNum" min="10" max="100" value="100">
        <span style="font-size:11px;color:#aaa">%</span>
      </div>

      <label class="control-label" style="margin-top:12px;">도장 찍는 방법</label>
      <p style="font-size:11px;color:#aaa;margin-bottom:6px;">PDF 위를 클릭하면 도장이 찍힙니다. 찍힌 도장을 드래그하여 위치를 조정하거나, 오른쪽 하단 핸들로 크기를 조절하세요.</p>
    </div>

    <!-- Download -->
    <div class="sidebar-section">
      <button class="btn btn-primary" id="downloadBtn" disabled>PDF 다운로드</button>
      <button class="btn btn-secondary" id="clearStampsBtn" style="display:none">이 페이지 도장 모두 지우기</button>
    </div>
  </div>

  <!-- Canvas Area -->
  <div class="canvas-area">
    <div class="zoom-controls">
      <button id="zoomOut">−</button>
      <span id="zoomLabel">100%</span>
      <button id="zoomIn">＋</button>
      <button id="zoomFit" style="width:auto;padding:0 10px;font-size:12px;">맞춤</button>
    </div>
    <div class="page-nav" id="pageNav" style="display:none">
      <button id="prevPage">◀ 이전</button>
      <span id="pageInfo">1 / 1</span>
      <button id="nextPage">다음 ▶</button>
    </div>
    <div class="canvas-wrapper" id="canvasWrapper">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <path d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
          <path d="M13 3v5a1 1 0 001 1h5"/>
        </svg>
        <p>왼쪽에서 PDF 파일을 업로드하세요</p>
        <small>PDF를 업로드한 후 도장 이미지를 업로드하여 PDF 위에 도장을 찍을 수 있습니다</small>
      </div>
      <div class="canvas-container" id="canvasContainer" style="display:none">
        <canvas id="pdfCanvas"></canvas>
        <div id="stampOverlay"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<!-- pdf-lib -->
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

<script>
(function() {
'use strict';

// ---- State ----
let pdfDoc = null;        // PDF.js doc
let pdfBytes = null;      // original pdf ArrayBuffer
let currentPage = 1;
let totalPages = 0;
let scale = 1.0;
let stampImgSrc = null;   // base64 data URL
let stampImgNaturalW = 0;
let stampImgNaturalH = 0;

// stamps[pageNum] = [{x, y, w, h, opacity, id}, ...]
// x,y,w,h are in PDF coordinate space (unscaled)
let stamps = {};
let selectedStampId = null;
let nextStampId = 1;

// Dragging state
let dragging = null; // {stampId, startX, startY, origX, origY}
let resizing = null; // {stampId, startX, startY, origW, origH}

// ---- Elements ----
const pdfDrop = document.getElementById('pdfDrop');
const pdfInput = document.getElementById('pdfInput');
const pdfFileInfo = document.getElementById('pdfFileInfo');
const pdfFileName = document.getElementById('pdfFileName');
const removePdf = document.getElementById('removePdf');

const stampDrop = document.getElementById('stampDrop');
const stampInput = document.getElementById('stampInput');
const stampPreviewWrap = document.getElementById('stampPreviewWrap');
const stampPreviewImg = document.getElementById('stampPreviewImg');
const stampFileName = document.getElementById('stampFileName');
const removeStamp = document.getElementById('removeStamp');
const stampControls = document.getElementById('stampControls');
const stampListSection = document.getElementById('stampListSection');
const stampList = document.getElementById('stampList');

const stampSizeRange = document.getElementById('stampSizeRange');
const stampSizeNum = document.getElementById('stampSizeNum');
const stampOpacityRange = document.getElementById('stampOpacityRange');
const stampOpacityNum = document.getElementById('stampOpacityNum');

const canvasWrapper = document.getElementById('canvasWrapper');
const canvasContainer = document.getElementById('canvasContainer');
const pdfCanvas = document.getElementById('pdfCanvas');
const stampOverlay = document.getElementById('stampOverlay');
const emptyState = document.getElementById('emptyState');

const pageNav = document.getElementById('pageNav');
const prevPage = document.getElementById('prevPage');
const nextPage = document.getElementById('nextPage');
const pageInfo = document.getElementById('pageInfo');

const zoomOut = document.getElementById('zoomOut');
const zoomIn = document.getElementById('zoomIn');
const zoomLabel = document.getElementById('zoomLabel');
const zoomFit = document.getElementById('zoomFit');

const downloadBtn = document.getElementById('downloadBtn');
const clearStampsBtn = document.getElementById('clearStampsBtn');
const toast = document.getElementById('toast');

// ---- Toast ----
let toastTimer;
function showToast(msg, type='') {
  toast.textContent = msg;
  toast.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.className = 'toast'; }, 3000);
}

// ---- File Drop Helpers ----
function setupDrop(zone, input, handler) {
  zone.addEventListener('click', () => input.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handler(file);
  });
  input.addEventListener('change', () => {
    if (input.files[0]) handler(input.files[0]);
    input.value = '';
  });
}

// ---- PDF Loading ----
setupDrop(pdfDrop, pdfInput, loadPdf);

async function loadPdf(file) {
  if (!file.type.includes('pdf') && !file.name.endsWith('.pdf')) {
    showToast('PDF 파일만 업로드 가능합니다.', 'error');
    return;
  }
  stamps = {};
  selectedStampId = null;
  pdfBytes = await file.arrayBuffer();

  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  pdfDoc = await pdfjsLib.getDocument({ data: pdfBytes.slice(0) }).promise;
  totalPages = pdfDoc.numPages;
  currentPage = 1;

  pdfFileInfo.style.display = 'flex';
  pdfFileName.textContent = file.name;
  pageNav.style.display = totalPages > 1 ? 'flex' : 'none';
  emptyState.style.display = 'none';
  canvasContainer.style.display = 'inline-block';

  await renderPage(currentPage);
  fitZoom();
  updatePageNav();
  updateDownloadBtn();
  showToast('PDF가 로드되었습니다.', 'success');
}

removePdf.addEventListener('click', () => {
  pdfDoc = null; pdfBytes = null; stamps = {}; selectedStampId = null;
  pdfFileInfo.style.display = 'none';
  pdfFileName.textContent = '';
  emptyState.style.display = 'flex';
  canvasContainer.style.display = 'none';
  pageNav.style.display = 'none';
  stampOverlay.innerHTML = '';
  updateDownloadBtn();
  updateStampList();
});

// ---- Stamp Image Loading ----
setupDrop(stampDrop, stampInput, loadStamp);

function loadStamp(file) {
  if (!file.type.startsWith('image/')) {
    showToast('이미지 파일만 업로드 가능합니다.', 'error');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    stampImgSrc = e.target.result;
    stampPreviewImg.src = stampImgSrc;
    stampPreviewWrap.style.display = 'block';
    stampFileName.textContent = file.name;
    stampControls.style.display = 'block';
    // Load natural dimensions
    const img = new Image();
    img.onload = () => {
      stampImgNaturalW = img.naturalWidth;
      stampImgNaturalH = img.naturalHeight;
    };
    img.src = stampImgSrc;
    showToast('도장 이미지가 로드되었습니다.', 'success');
  };
  reader.readAsDataURL(file);
}

removeStamp.addEventListener('click', () => {
  stampImgSrc = null;
  stampPreviewWrap.style.display = 'none';
  stampControls.style.display = 'none';
  stampFileName.textContent = '';
  stampPreviewImg.src = '';
});

// ---- Render PDF Page ----
async function renderPage(num) {
  if (!pdfDoc) return;
  const dpr = window.devicePixelRatio || 1;
  const page = await pdfDoc.getPage(num);
  const viewport = page.getViewport({ scale });
  // 물리 픽셀로 캔버스 크기 설정 (고DPI 선명도 확보)
  pdfCanvas.width = Math.floor(viewport.width * dpr);
  pdfCanvas.height = Math.floor(viewport.height * dpr);
  pdfCanvas.style.width = viewport.width + 'px';
  pdfCanvas.style.height = viewport.height + 'px';
  const ctx = pdfCanvas.getContext('2d');
  ctx.scale(dpr, dpr);
  await page.render({ canvasContext: ctx, viewport }).promise;
  renderStamps();
}

// ---- Zoom ----
function fitZoom() {
  if (!pdfDoc) return;
  const wrapper = canvasWrapper;
  const ww = wrapper.clientWidth - 48;
  const wh = wrapper.clientHeight - 48;
  const dpr = window.devicePixelRatio || 1;
  // CSS 픽셀 기준으로 자연 크기 계산 (DPR 제거)
  const naturalW = pdfCanvas.width / dpr / scale;
  const naturalH = pdfCanvas.height / dpr / scale;
  const fitScale = Math.min(ww / naturalW, wh / naturalH, 2.0);
  scale = Math.max(0.2, fitScale);
  renderPage(currentPage);
  updateZoomLabel();
}

zoomIn.addEventListener('click', () => { scale = Math.min(scale * 1.25, 4); renderPage(currentPage); updateZoomLabel(); });
zoomOut.addEventListener('click', () => { scale = Math.max(scale / 1.25, 0.2); renderPage(currentPage); updateZoomLabel(); });
zoomFit.addEventListener('click', fitZoom);
function updateZoomLabel() { zoomLabel.textContent = Math.round(scale * 100) + '%'; }

// ---- Page Nav ----
prevPage.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderPage(currentPage); updatePageNav(); } });
nextPage.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; renderPage(currentPage); updatePageNav(); } });
function updatePageNav() {
  pageInfo.textContent = currentPage + ' / ' + totalPages;
  prevPage.disabled = currentPage <= 1;
  nextPage.disabled = currentPage >= totalPages;
  updateStampList();
}

// ---- Stamp Placement on Click ----
canvasContainer.addEventListener('click', function(e) {
  if (!stampImgSrc) {
    if (pdfDoc) showToast('먼저 도장 이미지를 업로드하세요.', 'error');
    return;
  }
  // pdfCanvas 직접 클릭일 때만 도장 찍기 (stamp-handle 클릭은 제외)
  if (e.target !== pdfCanvas) return;

  const rect = pdfCanvas.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const clickY = e.clientY - rect.top;

  // Size in screen pixels, then convert to PDF space
  const sizeInScreen = parseInt(stampSizeNum.value) || 120;
  const wPdf = sizeInScreen / scale;
  const ratio = stampImgNaturalH > 0 ? stampImgNaturalH / stampImgNaturalW : 1;
  const hPdf = wPdf * ratio;
  const opacity = parseInt(stampOpacityNum.value) / 100;

  // Center stamp on click point, in PDF space
  const xPdf = (clickX / scale) - wPdf / 2;
  const yPdf = (clickY / scale) - hPdf / 2;

  const id = nextStampId++;
  if (!stamps[currentPage]) stamps[currentPage] = [];
  stamps[currentPage].push({ id, x: xPdf, y: yPdf, w: wPdf, h: hPdf, opacity });
  selectedStampId = id;

  renderStamps();
  updateStampList();
  updateDownloadBtn();
  updateClearBtn();
});

// ---- Render Stamps ----
function renderStamps() {
  stampOverlay.innerHTML = '';
  const list = stamps[currentPage] || [];
  list.forEach(s => {
    const el = document.createElement('div');
    el.className = 'stamp-handle' + (s.id === selectedStampId ? ' selected' : '');
    el.dataset.id = s.id;
    el.style.left = (s.x * scale) + 'px';
    el.style.top = (s.y * scale) + 'px';
    el.style.width = (s.w * scale) + 'px';
    el.style.height = (s.h * scale) + 'px';
    el.style.opacity = s.opacity;

    const img = document.createElement('img');
    img.src = stampImgSrc;
    img.draggable = false;
    el.appendChild(img);

    if (s.id === selectedStampId) {
      const resizeH = document.createElement('div');
      resizeH.className = 'resize-handle';
      resizeH.addEventListener('mousedown', e => startResize(e, s.id));
      resizeH.addEventListener('touchstart', e => startResizeTouch(e, s.id), { passive: false });
      resizeH.addEventListener('click', e => e.stopPropagation());
      el.appendChild(resizeH);

      const delH = document.createElement('div');
      delH.className = 'delete-handle';
      delH.textContent = '×';
      delH.addEventListener('click', e => { e.stopPropagation(); deleteStamp(s.id); });
      el.appendChild(delH);
    }

    el.addEventListener('mousedown', e => { if (e.target.classList.contains('resize-handle') || e.target.classList.contains('delete-handle')) return; startDrag(e, s.id); });
    el.addEventListener('touchstart', e => { if (e.target.classList.contains('resize-handle') || e.target.classList.contains('delete-handle')) return; startDragTouch(e, s.id); }, { passive: false });
    el.addEventListener('click', e => { e.stopPropagation(); selectedStampId = s.id; renderStamps(); updateStampList(); });

    stampOverlay.appendChild(el);
  });
}

function deleteStamp(id) {
  stamps[currentPage] = (stamps[currentPage] || []).filter(s => s.id !== id);
  if (selectedStampId === id) selectedStampId = null;
  renderStamps();
  updateStampList();
  updateDownloadBtn();
  updateClearBtn();
}

// ---- Drag ----
function getStamp(id) {
  for (const p in stamps) {
    const found = stamps[p].find(s => s.id === id);
    if (found) return found;
  }
  return null;
}

function startDrag(e, id) {
  e.preventDefault();
  selectedStampId = id;
  const s = getStamp(id);
  dragging = { id, startX: e.clientX, startY: e.clientY, origX: s.x, origY: s.y };
  renderStamps();
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', stopDrag);
}
function onDragMove(e) {
  if (!dragging) return;
  const dx = (e.clientX - dragging.startX) / scale;
  const dy = (e.clientY - dragging.startY) / scale;
  const s = getStamp(dragging.id);
  if (!s) return;
  s.x = dragging.origX + dx;
  s.y = dragging.origY + dy;
  renderStamps();
}
function stopDrag() {
  dragging = null;
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', stopDrag);
}

// Touch drag
function startDragTouch(e, id) {
  e.preventDefault();
  selectedStampId = id;
  const touch = e.touches[0];
  const s = getStamp(id);
  dragging = { id, startX: touch.clientX, startY: touch.clientY, origX: s.x, origY: s.y };
  renderStamps();
  document.addEventListener('touchmove', onDragMoveTouch, { passive: false });
  document.addEventListener('touchend', stopDragTouch);
}
function onDragMoveTouch(e) {
  if (!dragging) return;
  e.preventDefault();
  const touch = e.touches[0];
  const dx = (touch.clientX - dragging.startX) / scale;
  const dy = (touch.clientY - dragging.startY) / scale;
  const s = getStamp(dragging.id);
  if (!s) return;
  s.x = dragging.origX + dx;
  s.y = dragging.origY + dy;
  renderStamps();
}
function stopDragTouch() {
  dragging = null;
  document.removeEventListener('touchmove', onDragMoveTouch);
  document.removeEventListener('touchend', stopDragTouch);
}

// ---- Resize ----
function startResize(e, id) {
  e.preventDefault(); e.stopPropagation();
  const s = getStamp(id);
  resizing = { id, startX: e.clientX, startY: e.clientY, origW: s.w, origH: s.h };
  document.addEventListener('mousemove', onResizeMove);
  document.addEventListener('mouseup', stopResize);
}
function onResizeMove(e) {
  if (!resizing) return;
  const dx = (e.clientX - resizing.startX) / scale;
  const s = getStamp(resizing.id);
  if (!s) return;
  const ratio = resizing.origH / resizing.origW;
  s.w = Math.max(20 / scale, resizing.origW + dx);
  s.h = s.w * ratio;
  renderStamps();
}
function stopResize() {
  resizing = null;
  document.removeEventListener('mousemove', onResizeMove);
  document.removeEventListener('mouseup', stopResize);
}

function startResizeTouch(e, id) {
  e.preventDefault(); e.stopPropagation();
  const touch = e.touches[0];
  const s = getStamp(id);
  resizing = { id, startX: touch.clientX, startY: touch.clientY, origW: s.w, origH: s.h };
  document.addEventListener('touchmove', onResizeMoveTouch, { passive: false });
  document.addEventListener('touchend', stopResizeTouch);
}
function onResizeMoveTouch(e) {
  if (!resizing) return;
  e.preventDefault();
  const touch = e.touches[0];
  const dx = (touch.clientX - resizing.startX) / scale;
  const s = getStamp(resizing.id);
  if (!s) return;
  const ratio = resizing.origH / resizing.origW;
  s.w = Math.max(20 / scale, resizing.origW + dx);
  s.h = s.w * ratio;
  renderStamps();
}
function stopResizeTouch() {
  resizing = null;
  document.removeEventListener('touchmove', onResizeMoveTouch);
  document.removeEventListener('touchend', stopResizeTouch);
}

// ---- Stamp List UI ----
function updateStampList() {
  const list = stamps[currentPage] || [];
  if (list.length === 0) {
    stampListSection.style.display = 'none';
    stampList.innerHTML = '';
    return;
  }
  stampListSection.style.display = 'block';
  stampList.innerHTML = '';
  list.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'stamp-item' + (s.id === selectedStampId ? ' active' : '');
    const img = document.createElement('img');
    img.src = stampImgSrc;
    const label = document.createElement('span');
    label.textContent = '도장 ' + (i + 1);
    item.appendChild(img);
    item.appendChild(label);
    item.addEventListener('click', () => { selectedStampId = s.id; renderStamps(); updateStampList(); });
    stampList.appendChild(item);
  });
}

function updateClearBtn() {
  const list = stamps[currentPage] || [];
  clearStampsBtn.style.display = list.length > 0 ? 'block' : 'none';
}

clearStampsBtn.addEventListener('click', () => {
  stamps[currentPage] = [];
  selectedStampId = null;
  renderStamps();
  updateStampList();
  updateDownloadBtn();
  updateClearBtn();
});

// ---- Size / Opacity Sync ----
stampSizeRange.addEventListener('input', () => { stampSizeNum.value = stampSizeRange.value; });
stampSizeNum.addEventListener('input', () => { stampSizeRange.value = stampSizeNum.value; });
stampOpacityRange.addEventListener('input', () => { stampOpacityNum.value = stampOpacityRange.value; });
stampOpacityNum.addEventListener('input', () => { stampOpacityRange.value = stampOpacityNum.value; });

// ---- Download ----
function updateDownloadBtn() {
  const hasStamps = Object.values(stamps).some(arr => arr.length > 0);
  downloadBtn.disabled = !pdfDoc || !stampImgSrc || !hasStamps;
}

downloadBtn.addEventListener('click', downloadPdf);

// 도장 이미지를 원본 해상도 PNG Uint8Array로 변환 (모든 포맷 대응, 알파 채널 보존)
function getStampPngBytes() {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const offscreen = document.createElement('canvas');
      offscreen.width = img.naturalWidth;
      offscreen.height = img.naturalHeight;
      const ctx = offscreen.getContext('2d');
      ctx.drawImage(img, 0, 0);
      offscreen.toBlob(blob => {
        blob.arrayBuffer().then(buf => resolve(new Uint8Array(buf))).catch(reject);
      }, 'image/png');
    };
    img.onerror = reject;
    img.src = stampImgSrc;
  });
}

async function downloadPdf() {
  if (!pdfBytes || !stampImgSrc) return;
  downloadBtn.disabled = true;
  downloadBtn.textContent = '처리 중...';
  try {
    const { PDFDocument } = PDFLib;
    const pdfLibDoc = await PDFDocument.load(pdfBytes);
    const pages = pdfLibDoc.getPages();

    // 원본 해상도 PNG 바이트로 임베드 (WebP/JPG/PNG 모두 대응, 투명도 유지)
    const pngBytes = await getStampPngBytes();
    const embeddedImg = await pdfLibDoc.embedPng(pngBytes);

    // For each page with stamps, draw them
    for (const [pageNumStr, stampList] of Object.entries(stamps)) {
      const pageNum = parseInt(pageNumStr);
      if (!stampList || stampList.length === 0) continue;
      const pdfPage = pages[pageNum - 1];
      if (!pdfPage) continue;
      const { width: pageW, height: pageH } = pdfPage.getSize();

      // We need to get the rendered canvas size for this page to know the coordinate mapping
      // PDF.js renders at `scale`. The canvas size = page size * scale
      // Our stamp x,y,w,h are stored in "screen/scale" space divided by scale = PDF.js page pixel space
      // PDF.js page pixel space (scale=1) corresponds to PDF units (pt) directly
      // BUT: PDF coordinate origin is bottom-left, canvas is top-left
      // Conversion: pdfX = stampX (PDF.js px = PDF pt at scale=1)
      //             pdfY = pageH - stampY - stampH  (flip Y)

      for (const s of stampList) {
        const pdfX = s.x;
        const pdfY = pageH - s.y - s.h;
        pdfPage.drawImage(embeddedImg, {
          x: pdfX,
          y: pdfY,
          width: s.w,
          height: s.h,
          opacity: s.opacity,
        });
      }
    }

    // Flatten: remove all form fields to prevent selection
    // Also set PDF metadata so it looks natural
    try {
      const form = pdfLibDoc.getForm();
      form.flatten();
    } catch(e) { /* ignore if no form */ }

    const outBytes = await pdfLibDoc.save({
      useObjectStreams: false,
      addDefaultPage: false,
    });

    const blob = new Blob([outBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'stamped_' + (new Date().toISOString().slice(0,10)) + '.pdf';
    a.click();
    URL.revokeObjectURL(url);
    showToast('PDF 다운로드가 완료되었습니다.', 'success');
  } catch(err) {
    console.error(err);
    showToast('PDF 생성 중 오류가 발생했습니다: ' + err.message, 'error');
  } finally {
    downloadBtn.disabled = false;
    downloadBtn.textContent = 'PDF 다운로드';
    updateDownloadBtn();
  }
}

// Deselect stamp when clicking empty area
stampOverlay.addEventListener('click', e => {
  if (e.target === stampOverlay) { selectedStampId = null; renderStamps(); updateStampList(); }
});

// ---- Window resize: re-render ----
window.addEventListener('resize', () => { if (pdfDoc) renderPage(currentPage); });

})();
</script>
