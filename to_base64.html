<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>이미지 → Base64 변환기</title>
<style>
  body { font-family: sans-serif; padding: 30px; background: #f5f5f5; }
  h2 { color: #333; }
  .box { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
  input[type=file] { margin-bottom: 10px; }
  textarea { width: 100%; height: 80px; font-size: 11px; font-family: monospace; border: 1px solid #ddd; border-radius: 6px; padding: 8px; resize: vertical; }
  button { background: #4a90d9; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-top: 6px; }
  button:hover { background: #357abd; }
  img { max-width: 100px; max-height: 100px; margin-top: 8px; border: 1px solid #eee; border-radius: 4px; }
  .copied { background: #27ae60 !important; }
</style>
</head>
<body>
<h2>도장 이미지 → Base64 변환기</h2>

<div class="box">
  <label>도장 1</label>
  <input type="file" id="file1" accept="image/*">
  <br><img id="preview1" style="display:none">
  <br><textarea id="out1" placeholder="여기에 base64 코드가 나옵니다..." readonly></textarea>
  <br><button onclick="copy('out1', this)">복사</button>
</div>

<div class="box">
  <label>도장 2</label>
  <input type="file" id="file2" accept="image/*">
  <br><img id="preview2" style="display:none">
  <br><textarea id="out2" placeholder="여기에 base64 코드가 나옵니다..." readonly></textarea>
  <br><button onclick="copy('out2', this)">복사</button>
</div>

<script>
function handleFile(inputId, previewId, outId) {
  const input = document.getElementById(inputId);
  input.addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById(previewId).src = e.target.result;
      document.getElementById(previewId).style.display = 'block';
      document.getElementById(outId).value = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
handleFile('file1','preview1','out1');
handleFile('file2','preview2','out2');

function copy(id, btn) {
  const ta = document.getElementById(id);
  ta.select();
  document.execCommand('copy');
  btn.textContent = '복사됨!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 2000);
}
</script>
</body>
</html>
